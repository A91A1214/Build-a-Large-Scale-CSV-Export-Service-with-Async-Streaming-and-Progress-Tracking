version: '3.8'

services:
  app:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - API_PORT=${API_PORT:-8080}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-exporter}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_NAME=${DB_NAME:-exports_db}
      - DATABASE_URL=${DATABASE_URL:-postgresql://exporter:secret@db:5432/exports_db}
      - EXPORT_STORAGE_PATH=${EXPORT_STORAGE_PATH:-/app/exports}
    volumes:
      - exports_data:/app/exports
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 150m
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${DB_USER:-exporter}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
      - POSTGRES_DB=${DB_NAME:-exports_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seeds:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER:-exporter}", "-d", "${DB_NAME:-exports_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  exports_data:
